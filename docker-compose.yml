services:
  postgres:
    image: postgres:16-alpine
    container_name: saasrdv_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: saasrdv
      POSTGRES_PASSWORD: saasrdv_dev
      POSTGRES_DB: saasrdv
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saasrdv -d saasrdv']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saasrdv_backend
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saasrdv_frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
