version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saasrdv_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: saasrdv
      POSTGRES_PASSWORD: saasrdv_dev
      POSTGRES_DB: saasrdv
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saasrdv -d saasrdv']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saasrdv_backend
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saasrdv_frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - default

volumes:
  pgdata:

networks:
  default:
    driver: bridge
