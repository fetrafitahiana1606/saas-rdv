services:
  postgres:
    image: postgres:16-alpine
    container_name: saasrdv_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: saasrdv
      POSTGRES_PASSWORD: saasrdv_dev
      POSTGRES_DB: saasrdv
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saasrdv -d saasrdv']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saasrdv_backend
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: saasrdv
      DATABASE_PASSWORD: saasrdv_dev
      DATABASE_NAME: saasrdv
      GOOGLE_CLIENT_ID: your-google-client-id
      GOOGLE_CLIENT_SECRET: your-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:3001/auth/google/callback
      JWT_SECRET: super-secret-jwt-key-change-in-production
      STRIPE_SECRET_KEY: sk_test_your-stripe-secret-key
      STRIPE_WEBHOOK_SECRET: whsec_your-webhook-secret
      STRIPE_PRO_PRICE_ID: price_pro_placeholder
      STRIPE_BUSINESS_PRICE_ID: price_business_placeholder
      FRONTEND_URL: http://localhost:3000
      PORT: 3001
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saasrdv_frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
